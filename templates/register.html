{% extends "base.html" %}
{% block title %}SmartPlay — Registro{% endblock %}

{% block content %}
<div class="sp-auth">
  <div class="sp-card" style="width:100%; max-width:520px;">
    <div class="sp-card-b">
      <div style="text-align:center; margin-bottom:2rem;">
        <div style="display:inline-flex; background:rgba(139,92,246,0.1); padding:15px; border-radius:50%; margin-bottom:1rem; border:1px solid rgba(139,92,246,0.2);">
          <i data-lucide="user-plus" style="color:#a78bfa; width:32px; height:32px;"></i>
        </div>
        <h3 class="sp-heading" style="font-size:1.8rem;">Crear cuenta</h3>
        <p style="color:#94a3b8; font-size:.85rem; margin-top:5px;">Regístrate para calificar juegos y recibir recomendaciones personalizadas.</p>
      </div>

      <form method="POST" action="{{ url_for('register') }}">
        <div class="sp-mb2">
          <label class="sp-label">Nombre completo</label>
          <input type="text" name="nombre" class="sp-input" placeholder="ej. Laura Milena" required>
        </div>

        <div class="sp-g2 sp-mb2">
          <div>
            <label class="sp-label">ID de usuario</label>
            <input type="text" name="usuario_id" class="sp-input" placeholder="ej. Laura2" pattern="[A-Za-z][A-Za-z0-9_]{2,19}" title="Empieza con letra, 3-20 caracteres" required>
          </div>
          <div>
            <label class="sp-label">Edad</label>
            <input type="number" name="edad" class="sp-input" placeholder="ej. 22" min="10" max="99" required>
          </div>
        </div>

        <div class="sp-g2 sp-mb2">
          <div>
            <label class="sp-label">Región</label>
            <select name="region" class="sp-select" required>
              <option value="Colombia">Colombia</option>
              <option value="Mexico">Mexico</option>
              <option value="Argentina">Argentina</option>
              <option value="Chile">Chile</option>
              <option value="España">España</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div>
            <label class="sp-label">Plataforma favorita</label>
            <select name="plataforma" class="sp-select" required>
              <option value="PC">PC</option>
              <option value="PlayStation5">PlayStation 5</option>
              <option value="XboxSeriesX">Xbox Series X</option>
              <option value="NintendoSwitch">Nintendo Switch</option>
              <option value="Mobile">Mobile</option>
            </select>
          </div>
        </div>

        <div class="sp-g2 sp-mb3">
          <div>
            <label class="sp-label">Contraseña</label>
            <input type="password" name="password" class="sp-input" placeholder="Mínimo 6 caracteres" minlength="6" required autocomplete="new-password">
          </div>
          <div>
            <label class="sp-label">Confirmar contraseña</label>
            <input type="password" name="password2" class="sp-input" placeholder="Repite la contraseña" minlength="6" required autocomplete="new-password">
          </div>
        </div>

        <button type="submit" class="sp-btn sp-btn-primary sp-btn-full">
          <i data-lucide="rocket"></i> Crear cuenta
        </button>
      </form>

      <div class="sp-divider">¿Ya tienes cuenta?</div>

      <a href="{{ url_for('login') }}" class="sp-btn sp-btn-outline sp-btn-full" style="text-decoration:none;">
        <i data-lucide="log-in"></i> Iniciar sesión
      </a>
    </div>
  </div>
</div>
{% endblock %}
